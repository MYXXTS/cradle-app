name: Verify Windows Desktop Package

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref from wibus-wee/Cradle to checkout'
        required: true
        default: 'main'

permissions:
  contents: read

concurrency:
  group: verify-windows-desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-windows:
    name: Package Windows Desktop
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ inputs.source_ref || 'main' }}

      - name: Setup desktop build environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node-version: '24'

      - name: Build desktop runtime and app bundles
        run: pnpm --filter @cradle/desktop build
        env:
          CRADLE_ELECTRON_REBUILD_ARCH: x64

      - name: Verify Windows desktop runtime manifest
        shell: pwsh
        run: |
          $manifestPath = "apps/server/dist/desktop-runtime/desktop-runtime.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $manifest | ConvertTo-Json -Depth 10
          if ($manifest.electron.platform -ne "win32") {
            throw "Expected desktop runtime platform win32, got $($manifest.electron.platform)"
          }
          if ($manifest.electron.arch -ne "x64") {
            throw "Expected desktop runtime arch x64, got $($manifest.electron.arch)"
          }

      - name: Package unpacked Windows app
        working-directory: apps/desktop
        run: pnpm exec electron-builder --config electron-builder.mjs --win --x64 --dir --publish never

      - name: Verify native resources are Windows binaries
        shell: pwsh
        run: |
          $serverNodeModules = "apps/desktop/release/win-unpacked/resources/server/node_modules"
          if (Test-Path (Join-Path $serverNodeModules ".pnpm")) {
            throw "Packaged server runtime still contains pnpm virtual store; NSIS installation requires a hoisted node_modules layout."
          }

          $requiredRuntimeFiles = @(
            "ffi-rs/index.js",
            "@ff-labs/fff-node/dist/src/ffi.js",
            "@ff-labs/fff-bin-win32-x64/fff_c.dll",
            "@yuuang/ffi-rs-win32-x64-msvc/ffi-rs.win32-x64-msvc.node"
          )
          foreach ($relativePath in $requiredRuntimeFiles) {
            $path = Join-Path $serverNodeModules $relativePath
            if (!(Test-Path $path)) {
              throw "Packaged server runtime is missing $relativePath"
            }
          }

          $nativeFiles = Get-ChildItem $serverNodeModules -Recurse -File -Include *.node,*.dll,*.dylib,*.so
          if ($nativeFiles.Count -eq 0) {
            throw "No native .node/.dll files found in packaged server runtime."
          }
          $nativeFiles | Select-Object FullName, Length | Sort-Object FullName | Format-Table -AutoSize | Out-String -Width 4096 | Tee-Object -FilePath native-files.txt

          $wrongPlatformNames = $nativeFiles | Where-Object {
            $_.FullName -match "darwin|linux|macos" -or $_.Extension -in ".dylib", ".so"
          }
          if ($wrongPlatformNames.Count -gt 0) {
            $wrongPlatformNames | Select-Object FullName | Format-Table -AutoSize
            throw "Packaged runtime contains non-Windows native files."
          }

          foreach ($file in $nativeFiles) {
            $stream = [System.IO.File]::OpenRead($file.FullName)
            try {
              $header = New-Object byte[] 2
              [void]$stream.Read($header, 0, 2)
              if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) {
                throw "$($file.FullName) does not start with MZ PE magic."
              }
            }
            finally {
              $stream.Dispose()
            }
          }

      - name: Smoke load native modules through packaged Electron
        shell: pwsh
        run: |
          $script = @'
          const { createRequire } = require('node:module')
          const fs = require('node:fs')
          const path = require('node:path')
          const { pathToFileURL } = require('node:url')

          async function main() {
            const root = path.resolve(process.cwd(), 'apps/desktop/release/win-unpacked/resources/server')
            const req = createRequire(path.join(root, 'package.json'))
            for (const specifier of ['better-sqlite3', 'sharp', 'node-pty', '@node-rs/jieba']) {
              console.log(`loading ${specifier}`)
              const loaded = req(specifier)
              console.log(`loaded ${specifier}: ${typeof loaded}`)
            }

            const fffEntry = path.join(root, 'node_modules/@ff-labs/fff-node/dist/src/index.js')
            console.log(`loading ${fffEntry}`)
            const fff = await import(pathToFileURL(fffEntry).href)
            console.log(`loaded @ff-labs/fff-node: ${Object.keys(fff).join(',')}`)
            const markerPath = process.argv[2] ?? path.resolve(process.cwd(), 'native-smoke-success.txt')
            fs.writeFileSync(markerPath, 'ok\n')
            console.log(`wrote native smoke marker: ${markerPath}`)
          }

          main().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          '@

          Set-Content -Path native-smoke.cjs -Value $script -Encoding UTF8
          $markerPath = Join-Path (Get-Location) "native-smoke-success.txt"
          Remove-Item $markerPath -Force -ErrorAction SilentlyContinue
          $env:ELECTRON_RUN_AS_NODE = "1"
          & "apps/desktop/release/win-unpacked/Cradle.exe" native-smoke.cjs $markerPath
          $deadline = (Get-Date).AddSeconds(30)
          while (!(Test-Path $markerPath) -and (Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 250
          }
          if (!(Test-Path $markerPath)) {
            throw "Packaged Electron native module smoke failed with exit code $LASTEXITCODE"
          }

      - name: Launch packaged Windows app e2e
        run: node .github/scripts/windows-packaged-e2e.mjs
        env:
          CRADLE_E2E_ARTIFACT_NAME: win-unpacked

      - name: Build NSIS installer
        working-directory: apps/desktop
        run: pnpm exec electron-builder --config electron-builder.mjs --win nsis --x64 --publish never --config.compression=normal

      - name: Install NSIS package silently
        id: install
        shell: pwsh
        run: |
          $installer = Resolve-Path "apps/desktop/release/Cradle-setup.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "CradleInstall"
          Remove-Item $installDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $installDir | Out-Null
          Start-Process -FilePath $installer -ArgumentList "/S", "/D=$installDir" -Wait -NoNewWindow
          $exe = Join-Path $installDir "Cradle.exe"
          if (!(Test-Path $exe)) {
            Get-ChildItem $installDir -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
            throw "Installed Cradle.exe was not found at $exe"
          }
          "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Launch installed Windows app e2e
        run: node .github/scripts/windows-packaged-e2e.mjs
        env:
          CRADLE_E2E_ARTIFACT_NAME: installed
          CRADLE_E2E_EXE_PATH: ${{ steps.install.outputs.exe }}

      - name: Upload Windows package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cradle-windows-package
          if-no-files-found: warn
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/builder-effective-config.yaml
            apps/server/dist/desktop-runtime/desktop-runtime.json
            native-files.txt
            e2e/artifacts/windows-packaged-e2e/**
