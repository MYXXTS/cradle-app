<!doctype html>
<html lang="en">
  <head>
    <link
      rel="preload"
      href="/node_modules/@fontsource-variable/geist/files/geist-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      ;(function () {
        var parsed = JSON.parse(
          localStorage.getItem('cradle:theme:v1') || '{"state":{"mode":"system"}}'
        )
        var mode = parsed.state.mode
        var dark =
          mode === 'dark' ||
          (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
    <style>
      html,
      body,
      #app {
        height: 100%;
        width: 100%;
        margin: 0;
        background: #f7f7f5;
      }

      html.dark,
      html.dark body,
      html.dark #app {
        background: #171713;
      }

      #bootstrap-shell {
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-direction: column;
        gap: 18px;
        color: rgb(36 36 31 / 52%);
        font-family:
          Geist,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .bootstrap-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        opacity: 0.46;
        animation: bootstrap-breathe 2400ms ease-in-out infinite alternate;
        box-shadow:
          0 1px 2px rgb(0 0 0 / 8%),
          0 8px 24px rgb(0 0 0 / 8%);
      }

      .bootstrap-message {
        font-size: 12px;
        line-height: 16px;
        letter-spacing: -0.01em;
        text-wrap: pretty;
      }

      #bootstrap-shell.is-failed .bootstrap-icon {
        display: none;
      }

      #bootstrap-shell.is-failed .bootstrap-message {
        color: #b42318;
        white-space: normal;
      }

      @keyframes bootstrap-breathe {
        from {
          opacity: 0.34;
          transform: scale(0.985);
        }
        to {
          opacity: 0.68;
          transform: scale(1);
        }
      }

      html.dark #bootstrap-shell {
        color: rgb(238 238 232 / 42%);
      }

      @media (prefers-reduced-motion: reduce) {
        .bootstrap-icon {
          animation: none;
          opacity: 0.55;
        }
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Cradle</title>
  </head>
  <body>
    <div id="app" class="antialiased">
      <div id="bootstrap-shell" role="status" aria-live="polite">
        <img class="bootstrap-icon" src="/icon.png" alt="" aria-hidden="true" />
        <span class="bootstrap-message" data-bootstrap-message>Opening Cradle…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
