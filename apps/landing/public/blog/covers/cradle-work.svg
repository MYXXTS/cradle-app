<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#ffe9c2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffe9c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="600" fill="#0d0d10"/>
  <rect width="1000" height="600" fill="url(#glow)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 150 H1000 M0 300 H1000 M0 450 H1000"/>
    <path d="M250 0 V600 M500 0 V600 M750 0 V600"/>
  </g>
  <!-- delivery path: objective → execution → review → commit → PR -->
  <line x1="160" y1="330" x2="840" y2="330" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <!-- completed segment -->
  <line x1="160" y1="330" x2="500" y2="330" stroke="#f4f4f5" stroke-opacity="0.45" stroke-width="1.5"/>
  <!-- stations -->
  <g>
    <circle cx="160" cy="330" r="7" fill="#f4f4f5" fill-opacity="0.9"/>
    <circle cx="330" cy="330" r="7" fill="#f4f4f5" fill-opacity="0.9"/>
    <circle cx="500" cy="330" r="9" fill="#0d0d10" stroke="#ffe9c2" stroke-opacity="0.9" stroke-width="2"/>
    <circle cx="500" cy="330" r="3.5" fill="#ffe9c2" fill-opacity="0.9"/>
    <circle cx="670" cy="330" r="7" fill="#0d0d10" stroke="#f4f4f5" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="840" cy="330" r="7" fill="#0d0d10" stroke="#f4f4f5" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>
  <!-- station ticks -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1">
    <line x1="160" y1="356" x2="160" y2="364"/>
    <line x1="330" y1="356" x2="330" y2="364"/>
    <line x1="500" y1="356" x2="500" y2="364"/>
    <line x1="670" y1="356" x2="670" y2="364"/>
    <line x1="840" y1="356" x2="840" y2="364"/>
  </g>
  <!-- work capsule above the active station -->
  <rect x="436" y="238" width="128" height="44" rx="22" fill="none" stroke="#f4f4f5" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="462" cy="260" r="5" fill="#ffe9c2" fill-opacity="0.9"/>
  <path d="M478 260 h64" stroke="#f4f4f5" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>
  <line x1="500" y1="282" x2="500" y2="318" stroke="#f4f4f5" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="2 4"/>
</svg>
