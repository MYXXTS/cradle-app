<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8a8f9c" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#8a8f9c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="600" fill="#0d0d10"/>
  <rect width="1000" height="600" fill="url(#glow)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 150 H1000 M0 300 H1000 M0 450 H1000"/>
    <path d="M250 0 V600 M500 0 V600 M750 0 V600"/>
  </g>
  <!-- timeline -->
  <line x1="240" y1="300" x2="760" y2="300" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <!-- active segment before the wait -->
  <line x1="240" y1="300" x2="430" y2="300" stroke="#f4f4f5" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="240" cy="300" r="6" fill="#f4f4f5" fill-opacity="0.9"/>
  <!-- pause mark -->
  <g>
    <circle cx="500" cy="300" r="34" fill="none" stroke="#f4f4f5" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="492" y1="288" x2="492" y2="312" stroke="#ffe9c2" stroke-opacity="0.95" stroke-width="3" stroke-linecap="round"/>
    <line x1="508" y1="288" x2="508" y2="312" stroke="#ffe9c2" stroke-opacity="0.95" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- condition event ticking -->
  <circle cx="660" cy="300" r="6" fill="#0d0d10" stroke="#f4f4f5" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- resume checkmark -->
  <g>
    <circle cx="760" cy="300" r="18" fill="none" stroke="#f4f4f5" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M752 300 l6 6 l11 -12" fill="none" stroke="#f4f4f5" stroke-opacity="0.9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- suspended zzz -->
  <g fill="#f4f4f5" fill-opacity="0.3" font-family="monospace" font-size="20">
    <text x="528" y="252">z</text>
    <text x="542" y="236" font-size="15">z</text>
  </g>
</svg>
